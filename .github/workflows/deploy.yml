name: Deploy VitePress blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # 暂未提交 package-lock.json，先不启用缓存；后续提交 lockfile 后再打开
          # cache: npm
          # cache-dependency-path: docs/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install VitePress
        working-directory: docs
        run: npm install

      # 自动扫描 <category>/notes/ 目录，生成 sidebar 并拷贝到 docs/
      # 新增分类时只需在仓库里加 <新>/notes/，完全不用改 workflow
      - name: Prepare notes for build
        run: node scripts/build-sidebar.mjs

      - name: Build site
        working-directory: docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
